<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>{% block title%} {% endblock title %}</title>

  <style>
    body {
      padding-top: 70px; /* Fix for fixed navbar */
      background-color: #f8f9fa;
    }

    .navbar {
      transition: all 0.3s ease;
    }

    .navbar-brand {
      font-weight: bold;
      color: #0d6efd !important;
    }

    .nav-link {
      transition: 0.3s;
    }

    .nav-link:hover {
      color: #0d6efd !important;
    }

    .hero {
      padding: 80px 0;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
    }

    .hero p {
      color: #6c757d;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand" href="{% url 'index' %}">MySaaS</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="{% url 'index' %}">Home</a></li>
        {% comment %} <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li> {% endcomment %}
        {% if user.is_authenticated %}
<li class="nav-item">
    <a class="nav-link" href="{% url 'logout' %}">Logout</a>
</li>
{% else %}
<li class="nav-item">
    <a class="nav-link" href="{% url 'login' %}">Login</a>
</li>
{% endif %}
        {% comment %} <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Log In </a></li> {% endcomment %}
      </ul>

      <a href="{% url 'sign_up' %}" class="btn btn-primary ms-3">Sign Up </a>
    </div>
  </div>
</nav>


  {% block content %}
  {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
